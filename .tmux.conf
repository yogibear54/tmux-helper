# tmux-helper configuration
# Inspired by i3 window manager - intuitive keybindings

# =============================================================================
# PREFIX KEY - Ctrl-a (like screen, i3-friendly)
# =============================================================================

# Unbind default prefix
unbind C-b

# Set new prefix
set -g prefix C-a

# Allow ctrl-a to send ctrl-a to other apps (double-tap to send)
bind C-a send-prefix

# =============================================================================
# MOUSE MODE - i3-style mouse support
# =============================================================================

set -g mouse on

# Click to select pane
bind -T root MouseDown1Pane select-pane -t = ; display-message "Selected pane"

# Drag to resize pane
bind -T root MouseDrag1Pane resize-pane -Z

# Right-click for context menu
bind -T root MouseDown3Pane display-menu -T "tmux-helper"

# =============================================================================
# VIM-STYLE PANE NAVIGATION - i3 hjkl equivalent
# =============================================================================

# Vim-style pane navigation with Ctrl-a prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =============================================================================
# DIRECTION-BASED SPLITS - i3-style split commands
# =============================================================================

# Alt + h/j/k/l for direction-based splits
# These use Alt (Meta) without prefix - more i3-like

# Split left (vertical split)
bind -n M-h split-window -h -c "#{pane_current_path}"

# Split down (horizontal split)
bind -n M-j split-window -v -c "#{pane_current_path}"

# Split up (horizontal split)
bind -n M-k split-window -v -c "#{pane_current_path}"

# Split right (vertical split)
bind -n M-l split-window -h -c "#{pane_current_path}"

# =============================================================================
# LAYOUT CYCLING - Similar to i3 workspace switching
# =============================================================================

# Cycle next layout (Prefix + Space)
bind Space next-layout

# Cycle previous layout (Prefix + Shift+Space)
bind S-Space previous-layout

# =============================================================================
# SESSION/WINDOW MANAGEMENT
# =============================================================================

# Quick session picker (calls tmux-helper picker)
bind F run-shell -b "tmux-helper picker"

# New window
bind c new-window

# Kill pane
bind x kill-pane

# Kill window
bind X kill-window

# =============================================================================
# PANE MANAGEMENT
# =============================================================================

# Break pane into new window
bind ! break-pane

# Join pane into current window
bind : join-pane -h -s !

# Swap pane with adjacent
bind -r H swap-pane -t :{left-of}
bind -r J swap-pane -t :{down-of}
bind -r K swap-pane -t :{up-of}
bind -r L swap-pane -t :{right-of}

# =============================================================================
# ZOOM & FOCUS
# =============================================================================

# Zoom pane (like i3 fullscreen)
bind z zoom-pane -t :. -b

# =============================================================================
# STATUS LINE - i3-inspired minimal
# =============================================================================

set -g status-style 'bg=colour235,fg=colour255'
set -g status-left ' #[fg=colour39]#S#[default] '
set -g status-right ' #[fg=colour245]%H:%M '
set -g status-interval 1

# Window status
set -g window-status-format ' #I:#W '
set -g window-status-current-format ' #I:#W '
set -g window-status-current-style 'fg=colour39,bg=colour238'
set -g window-status-style 'fg=colour245'

# =============================================================================
# LOOK & FEEL
# =============================================================================

# Enable 256 colors
set -g default-terminal "screen-256color"

# Aggressive resize (instant)
set -g aggressive-resize on

# Start window index at 1 (like i3 workspaces)
set -g base-index 1
set -w -g pane-base-index 1

# Rename windows automatically
set -g automatic-rename on

# =============================================================================
# HELPER COMMANDS (called by keybindings)
# =============================================================================

# Show help overlay
bind ? run-shell "tmux-helper help"

# Mode indicator
set -g mode-keys vi

# =============================================================================
# PERFORMANCE TWEAKS
# =============================================================================

# Faster response
set -sg escape-time 0
set -sg repeat-time 300

# History limit
set -g history-limit 10000

# =============================================================================
# COPY MODE (vim-style)
# =============================================================================

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

# Mouse support in copy mode
bind -T copy-mode-vi MouseDown1Pane select-pane
bind -T copy-mode-vi DragStart1Pane select-pane ; copy-mode -t =
bind -T copy-mode-vi MouseDrag1Pane if -Ft= '{copy-mode -t=; send -X begin-selection}' '{send -X select-line}'
bind -T copy-mode-vi MouseUp1PaneEnd if -Ft= '{send -X copy-selection-and-cancel}' '{send -X cancel}'